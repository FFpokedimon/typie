<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Тайпи</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="../static/css/output.css">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('../static/img/background.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body class="relative flex flex-col min-h-screen font-montserrat" x-data="{showModal: false, formType: 'register', loggedIn: false}">
    <nav
        class="sticky bg-medium-jungle-900/80 text-gray-300 rounded-b-2xl px-6 py-4 mx-4 flex justify-between items-center backdrop-blur-xs">
        <div class="flex items-center space-x-7 text-lg">
            <a href="#" class="text-2xl font-press-start text-bright-lemon-300">Тайпи</a>
            <a href="leaderboard.html" class="hover:text-white transition-colors duration-100">Таблица лидеров</a>
            <a href="#" class="hover:text-white transition-colors duration-100">Друзья</a>
        </div>
        <div class="flex items-center space-x-4">
            <button
                class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold py-2 px-6 rounded-full font-montserrat transition-colors duration-200"
                @click="formType = 'login'; showModal = true">
                Вход
            </button>
            <button
                class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold py-2 px-6 rounded-full font-montserrat transition-colors duration-200"
                @click="formType = 'register'; showModal = true">
                Регистрация
            </button>
        </div>
    </nav>
    <main class="flex grow flex-col items-center justify-center px-4 -mt-16">
        <h1 class="text-[144px] font-bold font-press-start text-center text-bright-lemon-300 mb-16">
            Тайпи
        </h1>
        <a href="game.html"><button
                class="bg-yellow-green-500 text-white font-bold font-press-start py-6 px-16 rounded-full cursor-pointer shadow-[0_0.75rem_0] shadow-yellow-green-600 text-3xl hover:-translate-y-2 hover:shadow-[0_1.25rem_0] active:translate-y-1 active:shadow-[0_0.5rem_0] transition-all duration-200">
                ИГРАТЬ
            </button></a>
    </main>
    <div x-show="showModal" x-transition:enter="transition duration-300" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="transition duration-300"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" role="dialog">
        <div x-show="showModal" x-transition:enter="transition-all duration-300 ease-out"
            x-transition:enter-start="opacity-0 -translate-y-20" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition-all duration-300 ease-in"
            x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-20"
            @click.outside="showModal = false"
            class="bg-medium-jungle-900/80 w-[35vw] min-w-sm min-h-50 rounded-4xl shadow-lg relative backdrop-blur-xs">
            <button @click="showModal = false" class="absolute top-4 right-4 text-white hover:text-gray-300 text-xl">
                <span class="material-symbols-rounded">
                    close
                </span>
            </button>
            <div class="p-8 text-center">
                <h2 x-text="formType === 'login' ? 'Вход' : 'Регистрация'" class="text-2xl font-bold text-white mb-6">
                </h2>
                <form method="POST" class="flex flex-col gap-3 text-white">
                    <input type="text" placeholder="Логин" name="login" x-model="login" required
                        class="border border-white p-3 rounded-full">
                    <input type="password" placeholder="Пароль" name="password" x-model="password" required
                        class="border border-white p-3 rounded-full">
                    <input type="password" placeholder="Повторите пароль" name="passwordRpt" x-model="passwordRpt"
                        required class="border border-white p-3 rounded-full" :class="formType === 'register' && 'mb-4'"
                        x-show="formType === 'register'">
                    <input type="text" placeholder="Фамилия ребенка" name="lastName" x-model="lastName" required
                        class="border border-white p-3 rounded-full" x-show="formType === 'register'">
                    <input type="text" placeholder="Имя ребенка" name="firstName" x-model="firstName" required
                        class="border border-white p-3 rounded-full" x-show="formType === 'register'">
                    <input 
                    <input type="submit" :value="formType === 'login' ? 'Войти' : 'Зарегистрироваться'"
                        class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold mt-4 py-2 px-6 rounded-full font-montserrat transition-colors duration-200">
                </form>
                <button @click="formType = formType === 'login' ? 'register' : 'login'"
                    class="text-bright-lemon-500 no-underline hover:underline mt-4">
                    <span x-text="formType === 'login' ? 'Регистрация' : 'Вход'"></span>
                </button>
            </div>
        </div>
    </div>
</body>

</html>
