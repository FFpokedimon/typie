<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тайпи</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="output.css">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('img/background.jpg');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="relative flex flex-col min-h-screen font-montserrat"
      x-data="{showModal: false, formType: 'register'}">
    <nav class="navbar bg-medium-jungle-900/80 text-gray-200 rounded-b-2xl px-6 py-4 mx-4 flex justify-between items-center backdrop-blur-xs">
        <div class="flex space-x-6">
            <a href="#"><span class="text-lg">Таблица лидеров</span></a>
            <a href="#"><span class="text-lg">Друзья</span></a>
        </div>
        <div class="flex space-x-4">
            <button class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold py-2 px-6 rounded-full font-montserrat transition-colors duration-200"
                    @click="formType = 'login'; showModal = true">
                Вход
            </button>
            <button class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold py-2 px-6 rounded-full font-montserrat transition-colors duration-200"
                    @click="formType = 'register'; showModal = true">
                Регистрация
            </button>
        </div>
    </nav>
    <main class="flex grow flex-col items-center justify-center px-4 -mt-16">
        <h1 class="text-[144px] font-bold font-press-start text-center text-bright-lemon-300 mb-16">
            Тайпи
        </h1>
        <button class="bg-yellow-green-500 hover:bg-yellow-green text-white font-bold font-press-start py-6 px-16 rounded-3xl text-3xl transition-transform duration-200 hover:scale-105 shadow-lg">
            ИГРАТЬ
        </button>
    </main>
    <div x-show="showModal"
         x-transition:enter="transition duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"
         role="dialog">
        <div x-show="showModal"
             x-transition:enter="transition-all duration-300 ease-out"
             x-transition:enter-start="opacity-0 -translate-y-20"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition-all duration-300 ease-in"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-20"
             @click.outside="showModal = false"
             class="bg-medium-jungle-900/80 w-[35vw] min-w-sm min-h-50 rounded-4xl shadow-lg relative backdrop-blur-xs">
            <button @click="showModal = false"
                    class="absolute top-4 right-4 text-white hover:text-gray-300 text-xl">
                <span class="material-symbols-rounded">
                    close
                </span>
            </button>
            <div class="p-8 text-center">
                <h2 x-text="formType === 'login' ? 'Вход' : 'Регистрация'"
                    class="text-2xl font-bold text-white mb-6"></h2>
                <form method="POST" class="flex flex-col gap-3 text-white">
                    <input type="text" placeholder="Логин" name="login" x-model="login"
                           class="border border-white p-3 rounded-full">
                    <input type="password" placeholder="Пароль" name="password" x-model="password"
                           class="border border-white p-3 rounded-full">
                    <input type="password" placeholder="Повторите пароль" name="passwordRpt" x-model="passwordRpt"
                           class="border border-white p-3 rounded-full" :class="formType === 'register' && 'mb-4'"
                           x-show="formType === 'register'">
                    <input type="text" placeholder="Фамилия ребенка" name="lastName" x-model="lastName"
                           class="border border-white p-3 rounded-full"
                           x-show="formType === 'register'">
                    <input type="text" placeholder="Имя ребенка" name="firstName" x-model="firstName"
                           class="border border-white p-3 rounded-full"
                           x-show="formType === 'register'">
                    <div class="flex flex-row justify-between">
                        <label class="flex justify-between"><span class="mx-3 mt-3">Класс</span></label>
                        <div x-data="{ isOpen: false, selected: 'Дошкольник', options: ['Дошкольник', '1', '2', '3', '4', '5-7', '8-11'] }"
                             class="relative w-64 inline-block grow">
                            <button @click="isOpen = !isOpen"
                                    type="button"
                                    class="w-full px-4 py-3 border border-white rounded-full text-left">
                                <span x-text="selected"></span>
                            </button>
                            <ul x-show="isOpen"
                                @click.outside="isOpen = false"
                                x-transition:enter="transition ease-out duration-100"
                                x-transition:enter-start="transform opacity-0 scale-95"
                                x-transition:enter-end="transform opacity-100 scale-100"
                                x-transition:leave="transition ease-in duration-75"
                                x-transition:leave-start="transform opacity-100 scale-100"
                                x-transition:leave-end="transform opacity-0 scale-95"
                                class="absolute z-10 mt-1 w-full bg-medium-jungle-900 rounded-2xl overflow-hidden">
                                <template x-for="option in options" :key="option">
                                    <li @click="selected = option; isOpen = false; document.querySelector('#grade').value = option;"
                                        class="px-4 py-2 hover:bg-medium-jungle-800 cursor-pointer"
                                        x-text="option"></li>
                                </template>
                            </ul>
                        </div>
                        <input type="hidden" name="grade" id="grade" x-model="selected">
                    </div>
                    <input type="submit" :value="formType === 'login' ? 'Войти' : 'Зарегистрироваться'"
                           class="bg-bright-lemon-400 hover:bg-bright-lemon-600 text-gray-900 font-bold mt-4 py-2 px-6 rounded-full font-montserrat transition-colors duration-200">
                </form>
                <button @click="formType = formType === 'login' ? 'register' : 'login'"
                        class="text-bright-lemon-500 no-underline hover:underline mt-4">
                    <span x-text="formType === 'login' ? 'Регистрация' : 'Вход'"></span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
